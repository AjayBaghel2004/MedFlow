<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFlow | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, #e8f5e9 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: white;
            overflow: hidden;
        }

        .login-header {
            background-color: #2ecc71;
            padding: 30px;
            text-align: center;
            color: white;
        }

        .login-header i {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }

        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }

        .btn-login {
            background-color: #2ecc71;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #27ae60;
            transform: translateY(-1px);
        }

        .role-selector .btn-check:checked + .btn {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #777;
        }
    </style>
</head>
<body>

<div class="login-card p-0">
    <div class="login-header">
        <i class="bi bi-capsule-pill"></i>
        <h3 class="m-0 fw-bold">MedFlow</h3>
        <p class="small opacity-75">Pharmacy Management System</p>
    </div>

    <div class="p-4 p-md-5">
            <div class="text-center mb-4">
                <label class="form-label d-block text-muted small fw-bold text-uppercase">Select Your Role</label>
                <div class="btn-group w-100 role-selector" role="group">
                    <input type="radio" class="btn-check" name="role" id="roleAdmin" value ='Administrator' autocomplete="off" checked>
                    <label class="btn btn-outline-secondary py-2" for="roleAdmin">Admin</label>

                    <input type="radio" class="btn-check" name="role" id="roleStaff" value="Staff" autocomplete="off">
                    <label class="btn btn-outline-secondary py-2" for="roleStaff">Staff</label>
                </div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-bold">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control border-start-0" id="email" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none text-success fw-semibold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-success btn-login w-100 text-white" onclick="login()">
                <i class="bi bi-box-arrow-in-right me-2"></i> ACCESS SYSTEM
            </button>
        <div class="text-center mt-4 footer-text">
            &copy; 2026 MedFlow Systems. All rights reserved.
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    // Simple validation feedback for demo
    document.getElementById('loginForm').onsubmit = function(e) {
        const btn = document.querySelector('.btn-login');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Authenticating...';
        btn.classList.add('disabled');
        // Let it redirect naturally for this prototype
    };

    function login(){
        var  email = $('#email').val()
        var password = $('#password').val()
        $.ajax({
            method: "POST",
            url:"/login-user/",
            data: {
                "email":email,
                "password": password,
            },
            success: function(response){
                
                if (response.status == 200){
                    alert("Login Successfully")
                    location.href='/dashboard/'
                }
                else{
                    alert("Invalid credentials.")
                }
            },
            error: function(){
                alert("Incorrect Username or Password.")
            }    
        })
    }
</script>

</body>
</html>
