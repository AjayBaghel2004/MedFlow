{% extends 'layout/base.html' %}

{% block content %}

{{medicine_ID}}


                    <!-- Hidden ID -->
                    <input type="hidden" id="med_ID" value="{{medicine_ID.id}}">

                    <!-- Medicine Name -->
                    <div class="mb-3">
                        <label class="form-label">Medicine Name</label>
                        <input type="text" id="medicine_name" class="form-control" value="{{medicine_ID.medicine_name}}" required>
                    </div>

                    <!-- Category + Expiry -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="category" value="{{medicine_ID.med_category}}">
                                <option value="">--------</option>
                                <option value="TAB">Tablet</option>
                                <option value="SYR">Syrup</option>
                                <option value="INJ">Injection</option>
                                <option value="CAP">Capsule</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" id="expiry_date" value="{{medicine_ID.expiry_date}}" class="form-control">
                        </div>
                    </div>

                    <!-- Price + Quantity -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Unit Price (₹)</label>
                            <input type="number" id="price" value="{{medicine_ID.price}}" class="form-control" step="0.01">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" id="quantity" value="{{medicine_ID.quantity}}" class="form-control">
                        </div>
                    </div>

                    <!-- Stock Status -->
                    

            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-success px-4" onclick="update_medicine()">
                    Save Entry
                </button>
            </div>

        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    function update_medicine() {
        var med_ID=$("#med_ID").val()
        var expiry_date = $('#expiry_date').val()
        var quantity = $('#quantity').val()
        var price = $('#price').val()

        $.ajax({
            method: "POST",
            url: "/update-medicine/",
            data: {
                "med_ID": med_ID,
                "expiry_date": expiry_date,
                "quantity": quantity,
                "price": price,
                "csrfmiddlewaretoken": "{{ csrf_token }}"
            },
            success: function () {
                alert("Medicine updated successfully")
                location.href = "/medicine/"
            },
            error: function () {
                alert("Medicine information not updated")
            }
        })

    }
</script>
{% endblock %}
